[Definition]
actionstart = ipset create <setname> hash:net family inet timeout <blocktime> -exist
              iptables -C <chain> -m set --match-set <setname> src -j DROP 2>/dev/null || iptables -I <chain> -m set --match-set <setname> src -j DROP

actionstop = iptables -D <chain> -m set --match-set <setname> src -j DROP 2>/dev/null || true
             ipset destroy <setname> 2>/dev/null || true

actioncheck = ipset list <setname> >/dev/null 2>&1

actionban = /usr/local/sbin/f2b-subnet-ban.sh "<ip>" "<subnet_mask>" "<threshold>" "<window>" "<blocktime>" "<setname>"

actionunban = true

[Init]
subnet_mask = 16
threshold = 100
window = 300
blocktime = 7200
chain = INPUT
setname = f2b_subnet_abuse